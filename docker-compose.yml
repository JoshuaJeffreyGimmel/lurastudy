version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lurastudy_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lurastudy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lurastudy}
      POSTGRES_DB: ${POSTGRES_DB:-lurastudy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lurastudy} -d ${POSTGRES_DB:-lurastudy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lurastudy_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lurastudy}:${POSTGRES_PASSWORD:-lurastudy}@db:5432/${POSTGRES_DB:-lurastudy}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploaded_files:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lurastudy_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  uploaded_files:
